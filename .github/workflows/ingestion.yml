name: Daily Ingestion to BigQuery

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests pandas google-cloud-bigquery pandas-gbq pyarrow

      - name: Authenticate with JSON Key
        # On recrée le fichier temporairement pour que la lib Google le trouve
        run: |
          echo "${{ secrets.GCP_SA_KEY }}" > gcp_key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$GITHUB_WORKSPACE/gcp_key.json" >> $GITHUB_ENV

      - name: Run ingestion script
        run: python ingestion.py
