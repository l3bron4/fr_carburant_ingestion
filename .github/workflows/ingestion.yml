name: Daily Ingestion to BigQuery

on:
  schedule:
    - cron: '0 4 * * *' # Tous les jours à 4h00 UTC
  workflow_dispatch:      # Permet de le lancer manuellement

jobs:
  ingest:
    runs-on: ubuntu-latest
    # --- CRUCIAL : Permissions pour Workload Identity Federation ---
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests pandas google-cloud-bigquery pandas-gbq

      # --- TON BLOC D'AUTH ICI ---
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v1'
        with:
          # Remplace bien par TES vraies valeurs de ton autre projet
          workload_identity_provider: 'projects/123456789/locations/global/workloadIdentityPools/mon-pool/providers/mon-provider'
          service_account: 'mon-service-account@my-project-florent-bq.iam.gserviceaccount.com'

      - name: 'Run ingestion script'
        run: python ingestion.py
